<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SniperBot</title>
<style>
:root {
  --bg: #070b14;
  --surface: #0d1225;
  --card: #141b2d;
  --card-hover: #1a2338;
  --border: #1e293b;
  --border-light: #2a3a55;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #55657d;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --accent-bg: rgba(59,130,246,0.1);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.1);
  --cyan: #06b6d4;
  --radius: 10px;
  --radius-sm: 6px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track:transparent::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:200px;background:var(--surface);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px 10px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-0.2px}
.sidebar-header .sub{font-size:10px;color:var(--text3);margin-top:1px}
.sidebar-nav{flex:1;padding:6px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;font-size:12.5px;font-weight:500;transition:all .12s;margin-bottom:1px}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600}
.nav-item .ico{width:16px;text-align:center;font-size:13px}
.nav-item .count{margin-left:auto;font-size:10px;background:var(--card);padding:1px 6px;border-radius:8px;color:var(--text3)}
.nav-item.active .count{background:var(--accent-bg);color:var(--accent)}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--text3)}
.main{margin-left:200px;padding:20px 24px;max-width:1400px;min-height:100vh}
.section{display:none;animation:fadeIn .15s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:20px}
.page-header h2{font-size:18px;font-weight:700;letter-spacing:-0.2px}
.page-header .sub{font-size:12px;color:var(--text3);margin-top:3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;transition:border-color .15s}
.card:hover{border-color:var(--border-light)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-h h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat .num{font-size:24px;font-weight:700;line-height:1.2}
.stat .lbl{font-size:11px;color:var(--text3);margin-top:3px}
.stat.accent .num{color:var(--accent)}.stat.green .num{color:var(--green)}.stat.red .num{color:var(--red)}.stat.yellow .num{color:var(--yellow)}.stat.cyan .num{color:var(--cyan)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12.5px;font-weight:500;transition:all .12s;white-space:nowrap;font-family:inherit}
.btn:hover{background:var(--card-hover);border-color:var(--border-light)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent-hover)}
.btn-g{background:var(--green);border-color:var(--green);color:#fff}
.btn-g:hover{opacity:.85}
.btn-r{background:var(--red);border-color:var(--red);color:#fff}
.btn-r:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:11.5px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--card-hover);color:var(--text)}
.btn-group{display:flex;gap:5px}
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{text-align:left;padding:8px 10px;font-weight:600;color:var(--text3);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--card-hover)}
.mono{font-family:'SF Mono','JetBrains Mono','Fira Code',monospace;font-size:11.5px}
.addr{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:600;white-space:nowrap}
.badge-g{background:var(--green-bg);color:var(--green)}
.badge-r{background:var(--red-bg);color:var(--red)}
.badge-y{background:var(--yellow-bg);color:var(--yellow)}
.badge-b{background:var(--accent-bg);color:var(--accent)}
.badge-cy{background:rgba(6,182,212,0.1);color:var(--cyan)}
.badge-gr{background:rgba(100,116,139,0.1);color:var(--text3)}
.badge-o{border:1px solid var(--border);background:transparent;color:var(--text2)}
.toggle{position:relative;display:inline-block;width:32px;height:18px;flex-shrink:0;vertical-align:middle}
.toggle input{opacity:0;width:0;height:0}
.toggle .sl{position:absolute;cursor:pointer;inset:0;background:var(--border);transition:.2s;border-radius:18px}
.toggle .sl:before{position:absolute;content:"";height:12px;width:12px;left:3px;bottom:3px;background:var(--text3);transition:.2s;border-radius:50%}
.toggle input:checked+.sl{background:var(--accent)}
.toggle input:checked+.sl:before{background:#fff;transform:translateX(14px)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.form-group{margin-bottom:2px}
.form-group label{display:block;font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:12.5px;width:100%;transition:border-color .12s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 9px center;padding-right:28px}
.cb{display:flex;align-items:center;gap:6px;padding:4px 0}
.cb input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0}
.form-actions{margin-top:14px;display:flex;gap:8px;align-items:center;padding-top:14px;border-top:1px solid var(--border)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:92%;max-width:640px;max-height:85vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.6)}
.modal h2{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-actions{margin-top:16px;display:flex;gap:8px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--border)}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--bg);border-radius:var(--radius-sm);padding:3px;width:fit-content}
.tab{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;transition:.12s;border:none;background:none;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tab-content{display:none}.tab-content.active{display:block}
.channel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:border-color .12s}
.channel-card:hover{border-color:var(--border-light)}
.channel-card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.channel-card .name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.channel-card .chips{display:flex;flex-wrap:wrap;gap:5px;font-size:11px;margin-bottom:6px}
.channel-card .chip{background:var(--bg);padding:2px 8px;border-radius:4px;color:var(--text2)}
.channel-card .chip.accent{background:var(--accent-bg);color:var(--accent)}
.channel-card .chip.green{background:var(--green-bg);color:var(--green)}
.channel-card .stats-row{display:flex;gap:16px;font-size:11.5px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.channel-card .stats-row span{display:flex;align-items:center;gap:4px}
.channel-card .actions{display:flex;gap:5px;align-items:center}
.pos-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pos-detail-grid .item{padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);font-size:12.5px}
.pos-detail-grid .item .lbl{color:var(--text3);font-size:11px;margin-bottom:2px}
.pos-detail-grid .item .val{font-weight:600}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-state .ico{font-size:32px;margin-bottom:10px;opacity:.4}
.empty-state h4{font-size:14px;color:var(--text2);margin-bottom:5px}
.empty-state p{font-size:12.5px}
.log-line{padding:4px 0;font-size:11.5px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:flex-start;font-family:'SF Mono','JetBrains Mono',monospace}
.log-line:last-child{border-bottom:none}
.log-time{color:var(--text3);flex-shrink:0;font-size:10.5px}
.log-lv{flex-shrink:0;font-weight:600;font-size:9.5px;padding:1px 4px;border-radius:2px;text-transform:uppercase}
.log-lv.info{color:var(--accent);background:var(--accent-bg)}
.log-lv.error{color:var(--red);background:var(--red-bg)}
.log-lv.warn{color:var(--yellow);background:var(--yellow-bg)}
.toast-container{position:fixed;top:12px;right:12px;z-index:300;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:12.5px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideIn .15s ease;min-width:180px}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes slideIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){
  .sidebar{width:56px}
  .sidebar-header h1,.sidebar-header .sub,.nav-item span{display:none}
  .sidebar-header{padding:14px 0;text-align:center}
  .nav-item{padding:10px;justify-content:center}
  .nav-item .ico{font-size:15px}
  .nav-item .count{display:none}
  .main{margin-left:56px;padding:14px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .pos-detail-grid{grid-template-columns:1fr}
}
.mr{margin-right:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mt-12{margin-top:12px}.mt-8{margin-top:8px}.flex{display:flex}.gap-6{gap:6px}.gap-8{gap:8px}.items-center{align-items:center}.text-muted{color:var(--text3)}.text-sm{font-size:11.5px}.w-full{width:100%}.wrap{flex-wrap:wrap}.hide{display:none!important}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header"><h1>⚡ Sniper</h1><div class="sub">gmgn scraper</div></div>
  <nav class="sidebar-nav" id="nav">
    <div class="nav-item active" data-p="dashboard"><span class="ico">📊</span><span>Dashboard</span></div>
    <div class="nav-item" data-p="channels"><span class="ico">📡</span><span>Channels</span></div>
    <div class="nav-item" data-p="positions"><span class="ico">💼</span><span>Positions</span></div>
    <div class="nav-item" data-p="scraper"><span class="ico">🕵️</span><span>Scraper</span></div>
    <div class="nav-item" data-p="wallets"><span class="ico">👛</span><span>Wallets</span></div>
    <div class="nav-item" data-p="settings"><span class="ico">⚙️</span><span>Settings</span></div>
  </nav>
  <div class="sidebar-footer">⚡ v1.0</div>
</div>

<div class="main">
  <div id="page-dashboard" class="section active"></div>
  <div id="page-channels" class="section"></div>
  <div id="page-positions" class="section"></div>
  <div id="page-scraper" class="section"></div>
  <div id="page-wallets" class="section"></div>
  <div id="page-settings" class="section"></div>
</div>

<div class="modal-overlay" id="modal"><div class="modal" id="modal-c"></div></div>
<div class="toast-container" id="toast-c"></div>

<script>
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);
const api=async(p,o)=>{const r=await fetch('/api'+p,{headers:{'Content-Type':'application/json'},...o});if(!r.ok){let e;try{e=await r.json()}catch{e={error:r.statusText}}throw new Error(e.error||e.message||r.statusText)}return r.json()};
function toast(m,t='info'){const c=$('#toast-c'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;c.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),200)},2800)}
function closeModal(){$('#modal').classList.remove('active')}
function openModal(h){$('#modal-c').innerHTML=h;$('#modal').classList.add('active')}
$('#modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

let cp='dashboard';
function showPage(n){
  cp=n;
  $$('.section').forEach(s=>s.classList.remove('active'));
  $$('.nav-item').forEach(a=>a.classList.remove('active'));
  const el=$('#page-'+n);
  if(el)el.classList.add('active');
  const navItem=document.querySelector(`.nav-item[data-p="${n}"]`);
  if(navItem)navItem.classList.add('active');
  renderPage(n);
}
document.querySelectorAll('.nav-item').forEach(a=>{a.addEventListener('click',()=>showPage(a.dataset.p))});

async function renderPage(n){
  const el=$('#page-'+n);if(!el)return;
  try{
    const fns={dashboard:renderDashboard,channels:renderChannels,positions:renderPositions,scraper:renderScraper,wallets:renderWallets,settings:renderSettings};
    el.innerHTML=await fns[n]();
  }catch(err){el.innerHTML=`<div class="empty-state"><h4>Error</h4><p>${esc(err.message)}</p></div>`}
}

const fmtTime=ts=>ts?new Date(ts*1e3).toLocaleString():'-';
const fmtShort=ts=>ts?new Date(ts*1e3).toLocaleTimeString():'-';
const fmtCur=v=>{if(!v)return'$0';if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(1)+'K';return'$'+Number(v).toLocaleString()};
const addrShort=a=>a?a.slice(0,5)+'..'+a.slice(-3):'-';
const ago=ts=>{if(!ts)return'-';const s=Math.floor(Date.now()/1e3)-ts;if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'};
const esc=s=>s?String(s).replace(/[&<>"']/g,c=>$({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]):'';
function sb(s){const m={open:['badge-b','Open'],closed:['badge-g','Closed'],failed:['badge-r','Failed'],pending:['badge-y','Pending'],confirmed:['badge-g','Done'],active:['badge-g','Active'],cancelled:['badge-gr','Cancelled']};const[c,l]=m[s]||['badge-gr',s||'?'];return`<span class="badge ${c}">${l}</span>`}
function pnlBadge(p,pct){if(p==null)return'-';const pos=p>=0;return`<span class="badge ${pos?'badge-g':'badge-r'}">${pos?'+':''}$${Number(p).toFixed(4)}${pct!=null?' ('+(pos?'+':'')+pct.toFixed(2)+'%)':''}</span>`}

// ═══ DASHBOARD ═══
async function renderDashboard(){
  const[st,act]=await Promise.all([api('/status'),api('/activity')]);
  return`<div class="page-header"><h2>Dashboard</h2></div>
<div class="stats">
  <div class="stat accent"><div class="num">${st.channelCount}</div><div class="lbl">Channels</div></div>
  <div class="stat ${st.openTrades>0?'green':''}"><div class="num">${st.openTrades}</div><div class="lbl">Open Positions</div></div>
  <div class="stat yellow"><div class="num">${st.todaySignals}</div><div class="lbl">Signals Today</div></div>
  <div class="stat ${st.hasActiveWallet?'green':'red'}"><div class="num">${st.walletCount}</div><div class="lbl">${st.hasActiveWallet?'✅ Wallet':'No Wallet'}</div></div>
  <div class="stat cyan"><div class="num">${st.activeOrders}</div><div class="lbl">Active Orders</div></div>
  <div class="stat"><div class="num">${Math.floor(st.uptime/3600)}h${Math.floor((st.uptime%3600)/60)}m</div><div class="lbl">Uptime</div></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div class="card"><div class="card-h"><h3>Signals</h3></div>
    ${act.signals.length?`<div class="table-wrap"><table><thead><tr><th>Token</th><th>Chan</th><th>MC</th><th>Time</th></tr></thead><tbody>${act.signals.map(s=>`<tr><td><span class="mono addr" title="${s.token_address}">${s.token_symbol||addrShort(s.token_address)}</span></td><td>${s.source_channel||'-'}</td><td>${fmtCur(s.market_cap)}</td><td class="text-muted text-sm">${fmtShort(s.created_at)}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty-state" style="padding:30px"><p>No signals yet</p></div>`}
  </div>
  <div class="card"><div class="card-h"><h3>Trades</h3></div>
    ${act.trades.length?`<div class="table-wrap"><table><thead><tr><th>Token</th><th>Amt</th><th>P&L</th><th>Status</th></tr></thead><tbody>${act.trades.map(t=>`<tr><td><span class="mono addr" title="${t.token_address}">${t.token_symbol||addrShort(t.token_address)}</span></td><td>${t.buy_amount_sol||'-'}</td><td>${pnlBadge(t.pnl,t.pnl_percent)}</td><td>${sb(t.status)}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty-state" style="padding:30px"><p>No trades yet</p></div>`}
  </div>
</div>`;}

// ═══ CHANNELS (Scraper Setup — MAIN PAGE) ═══
async function renderChannels(){
  const channels=await api('/channels');
  return`<div class="page-header"><h2>Channels</h2><div class="sub">Add channels and configure scraper rules — TP/SL, fees, filters, multi-wallet</div></div>
<div class="card"><div class="card-h"><h3>${channels.length} Channel${channels.length!==1?'s':''}</h3><button class="btn btn-p btn-sm" onclick="openChannelForm()">+ Add Channel</button></div>
${channels.length?channels.map(c=>renderChannelCard(c)).join(''):`<div class="empty-state"><div class="ico">📡</div><h4>No channels</h4><p>Add a Telegram channel to start scraping token signals.</p><button class="btn btn-p mt-12" onclick="openChannelForm()">+ Add Channel</button></div>`}
</div>`;}

function renderChannelCard(c){
  const r=c.rule||{};
  let tpStr='';
  try{const tps=typeof r.tp_levels==='string'?JSON.parse(r.tp_levels):(r.tp_levels||[]);if(tps.length)tpStr=tps.map(t=>`TP${t.percent}%(${t.sell_ratio||100}%)`).join(', ')}catch{}
  const chips=[];
  if(r.min_market_cap!=null)chips.push(`MC≥${fmtCur(r.min_market_cap)}`);
  if(r.max_market_cap!=null)chips.push(`MC≤${fmtCur(r.max_market_cap)}`);
  if(r.min_liquidity!=null)chips.push(`Liq≥${fmtCur(r.min_liquidity)}`);
  if(r.take_profit_percent)chips.push(`SL:${r.take_profit_percent}%`);
  if(r.stop_loss_percent)chips.push(`SL:${r.stop_loss_percent}%`);
  if(tpStr)chips.push(tpStr);
  if(r.auto_buy)chips.push(`💰${r.buy_amount_sol||0.01}SOL`);
  if(r.priority_fee)chips.push(`⚡Fee:${r.priority_fee}`);
  if(r.wallet_group_id>0)chips.push(`👥Group#${r.wallet_group_id}`);

  return`<div class="channel-card">
  <div class="top">
    <div class="name">
      <label class="toggle"><input type="checkbox" ${c.active?'checked':''} onchange="togCh(${c.id})"><span class="sl"></span></label>
      ${c.display_name||c.channel_username}
      <span class="badge badge-o text-sm" style="font-size:10px">${c.channel_username}</span>

window.submitChannelForm=async function(id){
  const isNew=id===null||id==='null';
  if(isNew){
    const u=$('#f-ch').value.trim().replace('@','');if(!u)return toast('Username required','err');
    const r2=await api('/channels',{method:'POST',body:JSON.stringify({username:u,display_name:$('#f-ch-name').value.trim()})});
    id=r2.id||(await api('/channels?limit=1')).find(c=>c.channel_username===u)?.id;
    if(!id)return toast('Failed to create channel','err');
  }
  const tpInputs=$$('#tp-levels-container .flex');
  const tps=[];
  tpInputs.forEach(el=>{
    const pct=parseFloat(el.querySelector('.tp-pct')?.value);
    const ratio=parseFloat(el.querySelector('.tp-ratio')?.value);
    if(pct)tps.push({percent:pct,sell_ratio:ratio||100});
  });

  await api('/channels/'+id+'/rules',{method:'PUT',body:JSON.stringify({
    channel_id:id,
    min_market_cap:parseFloat($('#f-min-mc').value)||null,
    max_market_cap:parseFloat($('#f-max-mc').value)||null,
    min_liquidity:parseFloat($('#f-min-liq').value)||null,
    max_liquidity:parseFloat($('#f-max-liq').value)||null,
    buy_amount_sol:parseFloat($('#f-buy').value)||0.01,
    slippage:parseInt($('#f-slip').value)||30,
    anti_mev:$('#f-anti').checked,
    priority_fee:parseInt($('#f-fee').value)||null,
    tip_fee:parseInt($('#f-tip').value)||null,
    stop_loss_percent:parseFloat($('#f-sl').value)||null,
    tp_levels:tps,
    wallet_group_id:parseInt($('#f-wg').value)||0,
    auto_buy:$('#f-auto').checked,
  })});
  closeModal();toast(isNew?'Channel added ✅':'Channel updated ✅','ok');renderPage('channels');
};

window.execSell=async function(tradeId){
  const t=await api('/positions/'+tradeId);
  const pct=parseInt($('#f-s-pct').value);
  const limit=parseFloat($('#f-s-limit').value);
  const slip=parseInt($('#f-s-slip').value)||30;
  if(limit){
    try{
      await api('/orders/limit-sell',{method:'POST',body:JSON.stringify({chain:t.chain,wallet_address:t.wallet_address,token_address:t.token_address,target_price:limit,percent:pct,token_symbol:t.token_symbol})});
      closeModal();toast('Limit sell created ✅','ok');
    }catch(err){toast(err.message,'err')}
  }else{
    try{
      const r=await api('/sell',{method:'POST',body:JSON.stringify({chain:t.chain,wallet_address:t.wallet_address,token_address:t.token_address,percent:pct,slippage:slip})});
      if(t.buy_order_id)await api('/positions/'+tradeId+'/close',{method:'POST',body:JSON.stringify({sell_order_id:r.order_id,percent:pct,slippage:slip})});
      closeModal();toast('Sell executed ✅','ok');renderPage('positions');
    }catch(err){toast(err.message,'err')}
  }
};

  <div class="card"><div class="card-h"><h3>⚙️ Config</h3></div>
    <div class="form-grid">
      <div class="form-group"><label>Default Buy (SOL)</label><input id="s-buy" value="${settings.default_buy_amount||'0.01'}" type="number" step=".001"/></div>
      <div class="form-group"><label>Default Slippage (%)</label><input id="s-slip" value="${settings.default_slippage||'30'}" type="number"/></div>
      <div class="form-group"><label>Anti-MEV</label><select id="s-anti"><option value="true" ${settings.default_anti_mev==='true'?'selected':''}>On</option><option value="false" ${settings.default_anti_mev==='false'?'selected':''}>Off</option></select></div>
    </div>
    <div class="form-actions"><button class="btn btn-p btn-sm" onclick="saveSettings()">Save</button></div>
  </div>
  <div class="card"><div class="card-h"><h3>🔐 Status</h3></div>
    <div style="display:grid;gap:6px">${[
      ['GMGN',setup.gmgnConfigured,'✅','❌'],
      ['Telegram',setup.telegramConfigured,'✅','❌'],
      ['Session',setup.telegramSession,'✅','⚠️'],
      ['Channels',setup.hasChannels,setup.hasChannels?'✅':'0','Add'],
    ].map(([l,ok,y,n])=>`<div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--bg);border-radius:var(--radius-sm);font-size:12px"><span>${l}</span><span class="${ok?'badge-g':'badge-gr'} badge">${ok?y:n}</span></div>`).join('')}</div>
  </div>
</div>
<div class="card"><div class="card-h"><h3>📝 Environment</h3></div>
  <div class="text-sm text-muted">GMGN Key: <span class="mono">${settings.gmgn_api_key||'Not set'}</span><br>Get credentials: <a href="https://gmgn.ai/ai" target="_blank" style="color:var(--accent)">gmgn.ai</a> · <a href="https://my.telegram.org/apps" target="_blank" style="color:var(--accent)">Telegram</a></div>
</div>`;}
window.saveSettings=async function(){await api('/settings',{method:'POST',body:JSON.stringify({default_buy_amount:$('#s-buy').value,default_slippage:$('#s-slip').value,default_anti_mev:$('#s-anti').value})});toast('Saved','ok')};

// ═══ INIT ═══
async function init(){
  renderPage('dashboard');
  setInterval(async()=>{
    try{
      const st=await api('/status');
      $$('.nav-item[data-p="positions"] .count').textContent=st.openTrades;
      $$('.nav-item[data-p="channels"] .count').textContent=st.channelCount;
    }catch{}
  },8000);
}
init();
</script>
</body>
</html>
